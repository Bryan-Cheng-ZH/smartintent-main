apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: default
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rule-mongo
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rule-mongo
  template:
    metadata:
      labels:
        app: rule-mongo
    spec:
      containers:
        - name: mongo
          image: mongo:6
          ports:
            - containerPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: rule-mongo
  namespace: default
spec:
  selector:
    app: rule-mongo
  ports:
    - port: 27017
      targetPort: 27017